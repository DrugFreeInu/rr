<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
html,body{
  margin:0;
  height:100%;
  background:#111;
  display:grid;
  place-items:center;
}

.tent{
  position:relative;
  width:300px;
  height:260px;
}

.roof{
  width:0;
  height:0;
  border-left:150px solid transparent;
  border-right:150px solid transparent;
  border-bottom:120px solid #f5f0dc;
  position:absolute;
  top:20px;
}

.roof:before{
  content:"";
  position:absolute;
  left:-150px;
  top:0;
  width:300px;
  height:120px;
  background:repeating-linear-gradient(
    90deg,
    #c9153a 0 38px,
    #f5f0dc 38px 76px
  );
  clip-path:polygon(50% 0,100% 100%,0 100%);
}

.flag{
  position:absolute;
  left:145px;
  top:-28px;
  width:6px;
  height:72px;
  background:#ddd;
}

.flag:after{
  content:"";
  position:absolute;
  left:6px;
  top:4px;
  width:42px;
  height:25px;
  background:#c9153a;
  clip-path:polygon(0 0,100% 50%,0 100%);
}

.body{
  position:absolute;
  left:35px;
  top:135px;
  width:230px;
  height:105px;
  background:repeating-linear-gradient(
    90deg,
    #c9153a 0 32px,
    #f5f0dc 32px 64px
  );
  border-radius:0 0 18px 18px;
  box-shadow:0 18px 40px rgba(0,0,0,.45);
}

.door{
  position:absolute;
  left:105px;
  bottom:0;
  width:90px;
  height:92px;
  background:#1b0d12;
  clip-path:polygon(50% 0,100% 100%,0 100%);
}

.glow{
  position:absolute;
  inset:0;
  filter:blur(28px);
  background:radial-gradient(circle at 50% 65%,rgba(255,0,110,.45),transparent 55%);
  z-index:-1;
}
</style>
</head>
<body>
<div class="tent">
  <div class="glow"></div>
  <div class="flag"></div>
  <div class="roof"></div>
  <div class="body"></div>
  <div class="door"></div>
</div>
</body>
</html>
