<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rat Realm Grass Ruler 2P</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

.field {
  position: relative;
  width: 100vw;
  height: 160px;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  perspective: 900px;
}

.grass-world {
  position: absolute;
  left: 0;
  top: 0;
  width: 4000px;
  height: 160px;
  transform: translateX(0px) rotateY(0deg);
  transform-style: preserve-3d;
  will-change: transform, filter;
}

/* only animate when flipping, not while dragging */
.grass-world.flip-anim {
  transition: transform 650ms ease, filter 650ms ease;
}

.grass-world.flipping {
  filter: blur(7px);
}

.grass-world::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 34px;
  height: 2px;
  background: rgba(65, 120, 65, 0.45);
  z-index: 1;
}

.grass-strip {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 34px;
  height: 92px;
  z-index: 2;
}

.blade {
  position: absolute;
  bottom: 0;
  width: 3px;
  border-radius: 50% 50% 0 0;
  transform-origin: bottom center;
  clip-path: polygon(50% 0%,70% 20%,100% 100%,0% 100%,30% 20%);
}

.ruler {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 34px;
  z-index: 10;
  pointer-events: none;
  border-top: 1px solid rgba(0,0,0,.18);
  background: rgba(255,255,255,.55);
}

.tick {
  position: absolute;
  bottom: 0;
  width: 1px;
  background: rgba(0,0,0,.45);
}

.tick.small { height: 7px; }

.tick.medium {
  height: 12px;
  background: rgba(0,0,0,.55);
}

.tick.big {
  height: 19px;
  background: rgba(0,0,0,.7);
}

.tick-label {
  position: absolute;
  bottom: 18px;
  transform: translateX(-50%);
  font-family: monospace;
  font-size: 10px;
  color: rgba(0,0,0,.65);
  white-space: nowrap;
}

/* backside marker: readable but italic */
body.backside .tick-label {
  transform: translateX(-50%) rotateY(180deg);
  font-style: italic;
  color: rgba(0,0,0,.8);
}
</style>
</head>

<body>

<div class="field" id="field">
  <div class="grass-world" id="grassWorld">
    <div class="grass-strip" id="grass"></div>
    <div class="ruler" id="ruler"></div>
  </div>
</div>

<script>
const field = document.getElementById("field");
const grassWorld = document.getElementById("grassWorld");
const grass = document.getElementById("grass");
const ruler = document.getElementById("ruler");

const worldWidth = 4000;
const bladeCount = 900;

let worldX = 0;
let startX = 0;
let startWorldX = 0;
let dragging = false;
let moved = false;
let backside = false;

let rafPending = false;

let lastTapTime = 0;
let lastTapX = 0;
let lastTapY = 0;

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function maxLeft() {
  return field.clientWidth - worldWidth;
}

function currentCenterWorldX() {
  return -worldX + field.clientWidth / 2;
}

function render() {
  rafPending = false;

  worldX = clamp(worldX, maxLeft(), 0);

  const pivotX = currentCenterWorldX();
  const rot = backside ? 180 : 0;

  grassWorld.style.transformOrigin = `${pivotX}px 80px`;
  grassWorld.style.transform = `translateX(${worldX}px) rotateY(${rot}deg)`;
}

function requestRender() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(render);
}

function applyMove() {
  requestRender();
}

function flip2P() {
  backside = !backside;

  grassWorld.classList.add("flip-anim");
  grassWorld.classList.add("flipping");
  document.body.classList.toggle("backside", backside);

  render();

  setTimeout(() => {
    grassWorld.classList.remove("flipping");
  }, 380);

  setTimeout(() => {
    grassWorld.classList.remove("flip-anim");
  }, 700);
}

/* make grass */
for (let i = 0; i < bladeCount; i++) {
  const blade = document.createElement("div");
  blade.className = "blade";

  const h = rand(18, 92);
  const tilt = rand(-18, 18);
  const hue = rand(105, 128);
  const light = rand(24, 42);

  blade.style.left = `${i * (worldWidth / bladeCount)}px`;
  blade.style.height = `${h}px`;
  blade.style.transform = `rotate(${tilt}deg)`;
  blade.style.background = `hsl(${hue}, 52%, ${light}%)`;

  grass.appendChild(blade);
}

/* make ruler */
for (let x = 0; x <= worldWidth; x += 50) {
  const tick = document.createElement("div");

  if (x % 500 === 0) tick.className = "tick big";
  else if (x % 100 === 0) tick.className = "tick medium";
  else tick.className = "tick small";

  tick.style.left = `${x}px`;
  ruler.appendChild(tick);

  if (x % 500 === 0) {
    const label = document.createElement("div");
    label.className = "tick-label";
    label.style.left = `${x}px`;
    label.textContent = x;
    ruler.appendChild(label);
  }
}

/* iPhone touch drag + double tap */
field.addEventListener("touchstart", (e) => {
  dragging = true;
  moved = false;
  startX = e.touches[0].clientX;
  startWorldX = worldX;
}, { passive: false });

field.addEventListener("touchmove", (e) => {
  if (!dragging) return;
  e.preventDefault();

  const x = e.touches[0].clientX;
  const dx = x - startX;

  if (Math.abs(dx) > 5) moved = true;

  worldX = startWorldX + dx;
  applyMove();
}, { passive: false });

field.addEventListener("touchend", (e) => {
  dragging = false;

  if (moved) return;

  const now = Date.now();
  const touch = e.changedTouches[0];
  const x = touch.clientX;
  const y = touch.clientY;

  const closeTap =
    Math.abs(x - lastTapX) < 30 &&
    Math.abs(y - lastTapY) < 30;

  if (now - lastTapTime < 300 && closeTap) {
    flip2P();
    lastTapTime = 0;
    return;
  }

  lastTapTime = now;
  lastTapX = x;
  lastTapY = y;
});

field.addEventListener("touchcancel", () => {
  dragging = false;
});

/* desktop mouse drag + double click */
field.addEventListener("mousedown", (e) => {
  dragging = true;
  moved = false;
  startX = e.clientX;
  startWorldX = worldX;
});

field.addEventListener("dblclick", flip2P);

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const dx = e.clientX - startX;
  if (Math.abs(dx) > 5) moved = true;

  worldX = startWorldX + dx;
  applyMove();
});

window.addEventListener("mouseup", () => {
  dragging = false;
});

window.addEventListener("resize", render);

render();
</script>

</body>
</html>
