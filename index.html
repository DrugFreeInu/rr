<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scrollable Grass Field</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

.field {
  position: relative;
  width: 100vw;
  height: 140px;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}

.grass-world {
  position: absolute;
  left: 0;
  top: 0;
  width: 4000px;
  height: 140px;
  transform: translateX(0px);
  will-change: transform;
}

.grass-world::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 20px;
  height: 2px;
  background: rgba(65, 120, 65, 0.45);
  z-index: 1;
}

.grass-strip {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 20px;
  height: 90px;
  z-index: 2;
}

.blade {
  position: absolute;
  bottom: 0;
  width: 3px;
  border-radius: 50% 50% 0 0;
  transform-origin: bottom center;
  clip-path: polygon(50% 0%,70% 20%,100% 100%,0% 100%,30% 20%);
}
</style>
</head>

<body>

<div class="field" id="field">
  <div class="grass-world" id="grassWorld">
    <div class="grass-strip" id="grass"></div>
  </div>
</div>

<script>
const field = document.getElementById("field");
const grassWorld = document.getElementById("grassWorld");
const grass = document.getElementById("grass");

const worldWidth = 4000;
const bladeCount = 900;

let worldX = 0;
let startX = 0;
let startWorldX = 0;
let dragging = false;

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function maxLeft() {
  return field.clientWidth - worldWidth;
}

function applyMove() {
  worldX = clamp(worldX, maxLeft(), 0);
  grassWorld.style.transform = `translateX(${worldX}px)`;
}

for (let i = 0; i < bladeCount; i++) {
  const blade = document.createElement("div");
  blade.className = "blade";

  const h = rand(18, 92);
  const tilt = rand(-18, 18);
  const hue = rand(105, 128);
  const light = rand(24, 42);

  blade.style.left = `${i * (worldWidth / bladeCount)}px`;
  blade.style.height = `${h}px`;
  blade.style.transform = `rotate(${tilt}deg)`;
  blade.style.background = `hsl(${hue}, 52%, ${light}%)`;

  grass.appendChild(blade);
}

/* iPhone touch drag */
field.addEventListener("touchstart", (e) => {
  dragging = true;
  startX = e.touches[0].clientX;
  startWorldX = worldX;
}, { passive: false });

field.addEventListener("touchmove", (e) => {
  if (!dragging) return;
  e.preventDefault();

  const x = e.touches[0].clientX;
  const dx = x - startX;

  worldX = startWorldX + dx;
  applyMove();
}, { passive: false });

field.addEventListener("touchend", () => {
  dragging = false;
});

field.addEventListener("touchcancel", () => {
  dragging = false;
});

/* desktop mouse drag too */
field.addEventListener("mousedown", (e) => {
  dragging = true;
  startX = e.clientX;
  startWorldX = worldX;
});

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  const dx = e.clientX - startX;
  worldX = startWorldX + dx;
  applyMove();
});

window.addEventListener("mouseup", () => {
  dragging = false;
});

window.addEventListener("resize", applyMove);

applyMove();
</script>

</body>
</html>
