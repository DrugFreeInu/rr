<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scrollable Grass Field</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
}

body {
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* visible grass window */
.field {
  position: relative;
  width: 100%;
  height: 110px;
  overflow-x: hidden;
  overflow-y: hidden;
  touch-action: none;
  cursor: grab;
  user-select: none;
}

.field:active {
  cursor: grabbing;
}

/* long grass world inside the window */
.grass-world {
  position: relative;
  width: 3200px;
  min-width: 3200px;
  height: 110px;
  transform: translateX(0px);
  will-change: transform;
}

/* ground / horizon line */
.grass-world::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0px;
  height: 2px;
  background: rgba(65, 120, 65, 0.45);
  z-index: 1;
}

/* measure */
.measure {
  position: absolute;
  visibility: hidden;
  white-space: pre;
  font-family: "Chalkboard SE", "Comic Sans MS", cursive;
  font-size: 26px;
}

/* INPUT */
.grass-world input {
  position: absolute;
  left: 16px;
  top: 0;
  z-index: 5;
  width: 700px;
  height: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-family: "Chalkboard SE", "Comic Sans MS", cursive;
  font-size: 26px;
  color: #777;
  padding: 0;
  user-select: text;
}

/* hide default placeholder */
.grass-world input::placeholder {
  color: transparent;
}

/* grass */
.grass-strip {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0px;
  height: 76px;
  z-index: 2;
  pointer-events: auto;
  overflow: visible;
}

.blade {
  position: absolute;
  bottom: 0;
  width: 3px;
  border-radius: 50% 50% 0 0;
  transform-origin: bottom center;
  clip-path: polygon(50% 0%,70% 20%,100% 100%,0% 100%,30% 20%);
  transition: height 180ms ease, transform 180ms ease;
  pointer-events: auto;
}

/* clippings */
.clippings {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  overflow: visible;
}

.clip-piece {
  position: absolute;
  width: 3px;
  border-radius: 50% 50% 0 0;
  clip-path: polygon(50% 0%,70% 20%,100% 100%,0% 100%,30% 20%);
  transform-origin: bottom center;
  animation: fall 650ms ease-in forwards;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(var(--start-rot)); opacity: 0.95; }
  100% {
    transform: translateY(var(--fall-y)) translateX(var(--drift-x)) rotate(var(--end-rot));
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="field" id="field">
  <div class="grass-world" id="grassWorld">
    <div class="grass-strip" id="grass"></div>
    <div class="clippings" id="clippings"></div>

    <input 
      id="grassInput"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      autocomplete="off"
    />

    <span class="measure" id="measure"></span>
  </div>
</div>

<script>
const field = document.getElementById("field");
const grassWorld = document.getElementById("grassWorld");
const grassStrip = document.getElementById("grass");
const clippings = document.getElementById("clippings");
const input = document.getElementById("grassInput");
const measure = document.getElementById("measure");

const worldWidth = 3200;
const bladeCount = 720;
const blades = [];
const leftPadding = 16;

let worldX = 0;
let dragStartX = 0;
let dragStartWorldX = 0;
let isDragging = false;
let movedEnough = false;

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function maxLeftMove() {
  return Math.min(0, field.clientWidth - worldWidth);
}

function applyWorldX() {
  worldX = clamp(worldX, maxLeftMove(), 0);
  grassWorld.style.transform = `translateX(${worldX}px)`;
}

function makeBlade(i) {
  const blade = document.createElement("div");
  blade.className = "blade";

  let baseHeight;
  const r = Math.random();

  if (r < 0.2) baseHeight = rand(14, 24);
  else if (r < 0.7) baseHeight = rand(24, 46);
  else baseHeight = rand(46, 72);

  const tilt = rand(-14, 14);
  const hue = rand(105, 128);
  const light = rand(26, 44);

  blade.dataset.baseHeight = baseHeight;
  blade.dataset.baseTilt = tilt;

  blade.style.left = `${i * (worldWidth / bladeCount)}px`;
  blade.style.height = `${baseHeight}px`;
  blade.style.transform = `rotate(${tilt}deg)`;
  blade.style.background = `hsl(${hue}, 50%, ${light}%)`;

  grassStrip.appendChild(blade);
  blades.push(blade);
}

for (let i = 0; i < bladeCount; i++) makeBlade(i);

function getTextWidth() {
  measure.textContent = input.value || "";
  return measure.offsetWidth;
}

function updateGrass() {
  const textWidth = getTextWidth();
  const cutStart = leftPadding;
  const cutEnd = leftPadding + textWidth;

  blades.forEach((blade) => {
    const baseHeight = parseFloat(blade.dataset.baseHeight);
    const baseTilt = parseFloat(blade.dataset.baseTilt);

    let influence = 0;
    const bladeCenter = blade.offsetLeft + 1.5;

    if (bladeCenter >= cutStart && bladeCenter <= cutEnd) influence = 1;

    const targetHeight = Math.max(5, baseHeight * (1 - influence * 0.75));
    const newTilt = baseTilt * (1 - influence * 0.6);

    blade.style.height = `${targetHeight}px`;
    blade.style.transform = `rotate(${newTilt}deg)`;
  });
}

field.addEventListener("pointerdown", (e) => {
  if (e.target === input) return;

  isDragging = true;
  movedEnough = false;
  dragStartX = e.clientX;
  dragStartWorldX = worldX;

  field.setPointerCapture(e.pointerId);
});

field.addEventListener("pointermove", (e) => {
  if (!isDragging) return;

  const dx = e.clientX - dragStartX;

  if (Math.abs(dx) > 3) movedEnough = true;

  worldX = dragStartWorldX + dx;
  applyWorldX();
});

field.addEventListener("pointerup", (e) => {
  isDragging = false;
});

field.addEventListener("pointercancel", () => {
  isDragging = false;
});

window.addEventListener("resize", applyWorldX);

input.addEventListener("input", updateGrass);

updateGrass();
applyWorldX();
</script>

</body>
</html>
