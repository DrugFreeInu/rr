<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rat Realm Grass Ruler 2P</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* WORLD */
.field {
  position: relative;
  width: 100vw;
  height: 300px;
  overflow: visible;
  touch-action: none;
  user-select: none;
  perspective: 900px;
}

.grass-world {
  position: absolute;
  left: 0;
  top: 0;
  width: 4000px;
  height: 300px;
  overflow: visible;
  transform: translateX(0px) rotateY(0deg);
  transform-style: preserve-3d;
  will-change: transform, filter;
}

.grass-world.flip-anim {
  transition: transform 650ms ease, filter 650ms ease;
}

.grass-world.flipping {
  filter: blur(7px);
}

.grass-world::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 34px;
  height: 2px;
  background: rgba(65, 120, 65, 0.45);
  z-index: 1;
}

/* GRASS */
.grass-strip {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 34px;
  height: 192px;
  z-index: 2;
}

.blade {
  position: absolute;
  bottom: 0;
  width: 3px;
  border-radius: 50% 50% 0 0;
  transform-origin: bottom center;
  clip-path: polygon(50% 0%,70% 20%,100% 100%,0% 100%,30% 20%);
}

/* SIGN */
.placed-sign{
  position:absolute;
  left:100px;
  bottom:24px;
  width:70px;
  height:120px;
  z-index:6;
  transform-style:preserve-3d;
}

.rr-sign{
  position:relative;
  width:70px;
  height:120px;
  transform-style:preserve-3d;
  font-family:"Chalkboard SE","Comic Sans MS",cursive;
}

.sign-face{
  position:absolute;
  left:0;
  top:0;
  width:70px;
  height:60px;
  border-radius:12px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.18), transparent 35%),
    linear-gradient(135deg, #6b3f1e, #b9793a 55%, #5a3218);
  border:4px solid #3d2110;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    inset 0 -10px 18px rgba(0,0,0,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#251206;
  backface-visibility:hidden;
}

.sign-front{ transform:rotateY(0deg); }
.sign-back{ transform:rotateY(180deg); }

.sign-text{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  font-size:48px;
  font-weight:900;
  letter-spacing:1px;
  line-height:1;
  transform:translateY(-2px);
  text-shadow:
    1px 1px 0 rgba(255,255,255,.18),
    -1px -1px 0 rgba(0,0,0,.18);
}

.sign-front .sign-text{ transform:translateY(-7px); }
.sign-back .sign-text{ font-size:38px; }
.back-text{ gap:0; }

.face-part{
  position:relative;
  top:-3.5px;
  left:3px;
}

.three-part{
  position:relative;
  top:-0.5px;
}

.sign-post{
  position:absolute;
  left:50%;
  top:56px;
  width:18px;
  height:64px;
  transform:translateX(-50%);
  background:
    linear-gradient(90deg, #2b1609, #9a6330 45%, #4a2712);
  border-left:3px solid #2b1609;
  border-right:3px solid #2b1609;
  box-shadow:
    inset 3px 0 0 rgba(255,255,255,.1),
    inset -5px 0 0 rgba(0,0,0,.18);
  z-index:-1;
}

/* TRAFFIC LIGHT OBJECT */
.placed-traffic{
  position:absolute;
  left:233px;
  bottom:34px;
  width:120px;
  height:240px;
  z-index:7;
  pointer-events:auto;
  transform-style:preserve-3d;
}

.traffic-stack{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.traffic-module{
  position:relative;
  width:96px;
  height:76px;
  border:3px solid #050505;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    linear-gradient(
      to right,
      #030303,
      #171717 38%,
      #050505 70%,
      #000
    );
  box-shadow:
    0 10px 18px rgba(0,0,0,.45),
    inset 0 2px rgba(255,255,255,.04),
    inset 0 -4px rgba(0,0,0,.65);
}

.traffic-module:nth-child(1){
  transform:translateX(-6px) rotate(-2.4deg);
  border-radius:13px 13px 0 0;
}

.traffic-module:nth-child(2){
  transform:translateX(5px) rotate(1.8deg);
}

.traffic-module:nth-child(3){
  transform:translateX(-2px) rotate(-1deg);
  border-radius:0 0 13px 13px;
}

.bolt{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:
    radial-gradient(
      circle at 35% 30%,
      #bfc5ce,
      #7e848d 45%,
      #2b2f35 100%
    );
  box-shadow:
    inset 0 1px rgba(255,255,255,.28),
    inset 0 -1px rgba(0,0,0,.5),
    0 1px 3px rgba(0,0,0,.5);
}

.b1{left:8px;top:8px;}
.b2{right:8px;top:8px;}
.b3{left:8px;bottom:8px;}
.b4{right:8px;bottom:8px;}

.traffic-lens{
  position:relative;
  width:54px;
  height:54px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
  transition:opacity .25s, filter .25s;
}

.traffic-lens:before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.05) 0 1px,
      rgba(0,0,0,.06) 1px 2px,
      transparent 2px 4px
    ),
    repeating-radial-gradient(
      circle at center,
      rgba(255,255,255,.055) 0 2px,
      transparent 2px 4px
    );
  opacity:.55;
  mix-blend-mode:screen;
}

.traffic-lens:after{
  content:"";
  position:absolute;
  left:8px;
  top:7px;
  width:64%;
  height:34%;
  border-radius:50%;
  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,.28),
      rgba(255,255,255,.02)
    );
  filter:blur(1px);
  transform:rotate(-8deg);
}

.red{
  background:
    radial-gradient(circle at 35% 30%,
      #ffd2ca,
      #ff765d 14%,
      #ff351a 32%,
      #b11800 58%,
      #270200 100%
    );
  opacity:1;
}

.yellow{
  background:
    radial-gradient(circle at 35% 30%,
      #fff1c8,
      #ffd45c 14%,
      #ffb31e 32%,
      #b86d00 58%,
      #211100 100%
    );
  opacity:.25;
}

.green{
  background:
    radial-gradient(circle at 35% 30%,
      #ceffe4,
      #6dffac 14%,
      #18d866 32%,
      #007d35 58%,
      #001108 100%
    );
  opacity:.25;
}

.glitch{
  animation:electricLens .95s steps(1);
}

.glitch:before{
  opacity:.78;
  background:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,.48) 0 1px,
      rgba(200,230,255,.18) 1px 2px,
      transparent 2px 7px
    ),
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.34) 0 1px,
      transparent 1px 5px
    ),
    repeating-radial-gradient(
      circle at center,
      rgba(255,255,255,.28) 0 2px,
      transparent 2px 6px
    );
}

.glitch:after{
  background:
    radial-gradient(
      circle at 45% 45%,
      rgba(255,255,255,.58),
      rgba(210,235,255,.22) 30%,
      transparent 64%
    );
}

@keyframes electricLens{
  0%,100%{
    filter:brightness(1);
    box-shadow:none;
  }

  18%{
    filter:brightness(1.45) contrast(1.08);
    box-shadow:
      0 0 10px rgba(255,255,255,.32),
      0 0 22px rgba(180,220,255,.18);
  }

  34%{
    filter:brightness(.82);
    box-shadow:none;
  }

  56%{
    filter:brightness(1.7) contrast(1.12);
    box-shadow:
      0 0 12px rgba(255,255,255,.38),
      0 0 28px rgba(190,225,255,.20);
  }

  76%{
    filter:brightness(1.05);
    box-shadow:none;
  }
}

.broken{
  opacity:.06 !important;
  filter:grayscale(1) contrast(.7);
  box-shadow:none !important;
}

/* TENT */
.placed-tent{
  position:absolute;
  left:370px;
  bottom:34px;
  width:300px;
  height:260px;
  z-index:1;
  pointer-events:none;
  overflow:visible;
}

.tent{
  position:relative;
  width:300px;
  height:260px;
  transform:translateY(-65px);
}

.roof{
  width:0;
  height:0;
  border-left:150px solid transparent;
  border-right:150px solid transparent;
  border-bottom:120px solid #f5f0dc;
  position:absolute;
  top:20px;
}

.roof:before{
  content:"";
  position:absolute;
  left:-150px;
  top:0;
  width:300px;
  height:120px;
  background:repeating-linear-gradient(
    90deg,
    #c9153a 0 38px,
    #f5f0dc 38px 76px
  );
  clip-path:polygon(50% 0,100% 100%,0 100%);
}

.flag{
  position:absolute;
  left:145px;
  top:-28px;
  width:6px;
  height:72px;
  background:#ddd;
}

.flag:after{
  content:"";
  position:absolute;
  left:6px;
  top:4px;
  width:42px;
  height:25px;
  background:#c9153a;
  clip-path:polygon(0 0,100% 50%,0 100%);
}

.body{
  position:absolute;
  left:35px;
  top:135px;
  width:230px;
  height:105px;
  background:repeating-linear-gradient(
    90deg,
    #c9153a 0 32px,
    #f5f0dc 32px 64px
  );
  border-radius:0 0 18px 18px;
  box-shadow:0 18px 40px rgba(0,0,0,.45);
}

.door{
  position:absolute;
  left:105px;
  bottom:0;
  width:90px;
  height:92px;
  background:#1b0d12;
  clip-path:polygon(50% 0,100% 100%,0 100%);
}

.glow{
  position:absolute;
  inset:0;
  filter:blur(28px);
  background:radial-gradient(circle at 50% 65%,rgba(255,0,110,.45),transparent 55%);
  z-index:-1;
}

/* RULER */
.ruler {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 34px;
  z-index: 10;
  pointer-events: none;
  border-top: 1px solid rgba(0,0,0,.18);
  background: rgba(255,255,255,.55);
}

.tick {
  position: absolute;
  bottom: 0;
  width: 1px;
  background: rgba(0,0,0,.45);
}

.tick.small { height: 7px; }

.tick.medium {
  height: 12px;
  background: rgba(0,0,0,.55);
}

.tick.big {
  height: 19px;
  background: rgba(0,0,0,.7);
}

.tick-label {
  position: absolute;
  bottom: 18px;
  transform: translateX(-50%);
  font-family: monospace;
  font-size: 10px;
  color: rgba(0,0,0,.65);
  white-space: nowrap;
}

body.backside .tick-label {
  transform: translateX(-50%) rotateY(180deg);
  font-style: italic;
  color: rgba(0,0,0,.8);
}
</style>
</head>

<body>

<div class="field" id="field">
  <div class="grass-world" id="grassWorld">

    <div class="grass-strip" id="grass"></div>

    <div class="placed-sign">
      <div class="rr-sign">

        <div class="sign-face sign-front">
          <div class="sign-text">rr</div>
        </div>

        <div class="sign-face sign-back">
          <div class="sign-text back-text">
            <span class="face-part">&lt;:</span>
            <span class="three-part">3</span>
          </div>
        </div>

        <div class="sign-post"></div>

      </div>
    </div>

    <div class="placed-traffic" id="trafficLight">
      <div class="traffic-stack">

        <div class="traffic-module">
          <div class="bolt b1"></div>
          <div class="bolt b2"></div>
          <div class="bolt b3"></div>
          <div class="bolt b4"></div>
          <div class="traffic-lens red"></div>
        </div>

        <div class="traffic-module">
          <div class="bolt b1"></div>
          <div class="bolt b2"></div>
          <div class="bolt b3"></div>
          <div class="bolt b4"></div>
          <div class="traffic-lens yellow"></div>
        </div>

        <div class="traffic-module">
          <div class="bolt b1"></div>
          <div class="bolt b2"></div>
          <div class="bolt b3"></div>
          <div class="bolt b4"></div>
          <div class="traffic-lens green"></div>
        </div>

      </div>
    </div>

    <div class="placed-tent">
      <div class="tent">
        <div class="glow"></div>
        <div class="flag"></div>
        <div class="roof"></div>
        <div class="body"></div>
        <div class="door"></div>
      </div>
    </div>

    <div class="ruler" id="ruler"></div>

  </div>
</div>

<script>
const field = document.getElementById("field");
const grassWorld = document.getElementById("grassWorld");
const grass = document.getElementById("grass");
const ruler = document.getElementById("ruler");

const worldWidth = 4000;
const bladeCount = 900;

let worldX = 0;
let startX = 0;
let startWorldX = 0;
let dragging = false;
let moved = false;
let backside = false;

let rafPending = false;

let lastTapTime = 0;
let lastTapX = 0;
let lastTapY = 0;

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function maxLeft() {
  return field.clientWidth - worldWidth;
}

function currentCenterWorldX() {
  return -worldX + field.clientWidth / 2;
}

function render() {
  rafPending = false;

  worldX = clamp(worldX, maxLeft(), 0);

  const pivotX = currentCenterWorldX();
  const rot = backside ? 180 : 0;

  grassWorld.style.transformOrigin = `${pivotX}px 170px`;
  grassWorld.style.transform = `translateX(${worldX}px) rotateY(${rot}deg)`;
}

function requestRender() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(render);
}

function applyMove() {
  requestRender();
}

function flip2P() {
  backside = !backside;

  grassWorld.classList.add("flip-anim");
  grassWorld.classList.add("flipping");
  document.body.classList.toggle("backside", backside);

  render();

  setTimeout(() => {
    grassWorld.classList.remove("flipping");
  }, 380);

  setTimeout(() => {
    grassWorld.classList.remove("flip-anim");
  }, 700);
}

/* GRASS */
for (let i = 0; i < bladeCount; i++) {
  const blade = document.createElement("div");
  blade.className = "blade";

  const h = rand(18, 92);
  const tilt = rand(-18, 18);
  const hue = rand(105, 128);
  const light = rand(24, 42);

  blade.style.left = `${i * (worldWidth / bladeCount)}px`;
  blade.style.height = `${h}px`;
  blade.style.transform = `rotate(${tilt}deg)`;
  blade.style.background = `hsl(${hue}, 52%, ${light}%)`;

  grass.appendChild(blade);
}

/* RULER */
for (let x = 0; x <= worldWidth; x += 50) {
  const tick = document.createElement("div");

  if (x % 500 === 0) tick.className = "tick big";
  else if (x % 100 === 0) tick.className = "tick medium";
  else tick.className = "tick small";

  tick.style.left = `${x}px`;
  ruler.appendChild(tick);

  if (x % 500 === 0) {
    const label = document.createElement("div");
    label.className = "tick-label";
    label.style.left = `${x}px`;
    label.textContent = x;
    ruler.appendChild(label);
  }
}

/* TRAFFIC LIGHT TAP LOGIC */
document.querySelectorAll(".traffic-lens").forEach(light=>{
  let state = 0;

  light.addEventListener("touchstart", e=>{
    e.stopPropagation();
  }, {passive:false});

  light.addEventListener("touchmove", e=>{
    e.stopPropagation();
  }, {passive:false});

  light.addEventListener("mousedown", e=>{
    e.stopPropagation();
  });

  light.addEventListener("click", e=>{
    e.stopPropagation();

    state++;

    if(state === 1){
      light.classList.remove("glitch");
      void light.offsetWidth;
      light.classList.add("glitch");

      setTimeout(()=>{
        light.classList.remove("glitch");
      },950);
    }

    else if(state === 2){
      light.classList.remove("glitch");
      light.style.opacity = ".08";
      light.style.boxShadow = "none";
    }

    else if(state === 3){
      light.classList.add("broken");
      light.classList.remove("glitch");
    }

    else{
      state = 0;
      light.classList.remove("broken");
      light.classList.remove("glitch");
      light.style.boxShadow = "";

      if(light.classList.contains("red")){
        light.style.opacity = "1";
      }else{
        light.style.opacity = ".25";
      }
    }
  });
});

/* WORLD TOUCH */
field.addEventListener("touchstart", (e) => {
  if(e.target.closest(".placed-traffic")) return;

  dragging = true;
  moved = false;
  startX = e.touches[0].clientX;
  startWorldX = worldX;
}, { passive: false });

field.addEventListener("touchmove", (e) => {
  if (!dragging) return;
  e.preventDefault();

  const x = e.touches[0].clientX;
  const dx = x - startX;

  if (Math.abs(dx) > 5) moved = true;

  worldX = startWorldX + dx;
  applyMove();
}, { passive: false });

field.addEventListener("touchend", (e) => {
  if(e.target.closest(".placed-traffic")){
    dragging = false;
    return;
  }

  dragging = false;

  if (moved) return;

  const now = Date.now();
  const touch = e.changedTouches[0];
  const x = touch.clientX;
  const y = touch.clientY;

  const closeTap =
    Math.abs(x - lastTapX) < 30 &&
    Math.abs(y - lastTapY) < 30;

  if (now - lastTapTime < 300 && closeTap) {
    flip2P();
    lastTapTime = 0;
    return;
  }

  lastTapTime = now;
  lastTapX = x;
  lastTapY = y;
});

field.addEventListener("touchcancel", () => {
  dragging = false;
});

/* WORLD MOUSE */
field.addEventListener("mousedown", (e) => {
  if(e.target.closest(".placed-traffic")) return;

  dragging = true;
  moved = false;
  startX = e.clientX;
  startWorldX = worldX;
});

field.addEventListener("dblclick", (e)=>{
  if(e.target.closest(".placed-traffic")) return;
  flip2P();
});

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const dx = e.clientX - startX;
  if (Math.abs(dx) > 5) moved = true;

  worldX = startWorldX + dx;
  applyMove();
});

window.addEventListener("mouseup", () => {
  dragging = false;
});

window.addEventListener("resize", render);

render();
</script>
</body>
</html>
